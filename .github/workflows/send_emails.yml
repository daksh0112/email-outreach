name: Email Batch Sender

on:
  schedule:
    - cron: '0 4 * * *'    # 9:30 AM IST  (UTC+5:30 → 4:00 AM UTC)
    - cron: '0 12 * * *'   # 5:30 PM IST  (UTC+5:30 → 12:00 PM UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI on phone

jobs:
  send-emails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run batch sender
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_ACTIONS: "true"
        run: |
          PYTHONUNBUFFERED=1 python batch_send.py --run

      - name: Save progress back to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_emails_list.txt send_progress.txt failed_remaining.json || true
          git diff --staged --quiet || git commit -m "chore: update sent list [skip ci]"
          git push
